<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Map Marker — Banda Aceh</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet"/>

  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">📍</div>
    <div class="logo-text">Map<span>Marker</span></div>
  </div>
  <div class="header-meta">Banda Aceh · Leaflet.js</div>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="section-label">Lokasi Tersimpan</div>
      <h2 class="sidebar-title">Daftar Lokasi</h2>
      <p class="sidebar-subtitle">Klik salah satu lokasi untuk melihat titiknya di peta.</p>
    </div>
    <div id="markerList" class="marker-list"></div>
  </aside>

  <div class="map-panel">
    <div id="map"></div>
  </div>
</div>

<!-- Leaflet -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Marker Data -->
<script src="script.js"></script>
  <footer style="text-align:center; padding:10px; font-size:13px; opacity:0.7;">
  Map Marker App - Versi Pengembangan
</footer>
</body>
</html>
